name: Protect Rules Directory

on:
  pull_request:
    branches: [main]

jobs:
  prevent-mixed-rules-changes:
    runs-on: ubuntu-latest
    outputs:
      violation: ${{ steps.check-changes.outputs.violation }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prevent mixed changes to rules directory
        id: check-changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"

          if ! printf '%s\n' "${CHANGED_FILES}" | grep -q '^rules/'; then
            echo "violation=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -qv '^rules/'; then
            echo "violation=true" >> "${GITHUB_OUTPUT}"
            echo "::error::rules/ 디렉토리 변경은 다른 디렉토리의 변경과 함께 PR에 포함할 수 없습니다."
            exit 1
          fi

          echo "violation=false" >> "${GITHUB_OUTPUT}"

  sync-violation-comment:
    if: ${{ always() }}
    needs: prevent-mixed-rules-changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Create or remove violation comment
        uses: actions/github-script@v7
        env:
          VIOLATION: ${{ needs.prevent-mixed-rules-changes.outputs.violation }}
        with:
          script: |
            const marker = '<!-- protect-rules-directory -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const managedComments = comments.filter(
              (comment) =>
                comment.user.login === 'github-actions[bot]' &&
                comment.body.includes(marker),
            );

            if (process.env.VIOLATION === 'true') {
              const body = `${marker}\n⚠️ \`rules/\` 디렉토리 변경은 다른 디렉토리의 변경과 함께 PR에 포함할 수 없습니다.`;

              if (managedComments.length === 0) {
                await github.rest.issues.createComment({ owner, repo, issue_number, body });
              } else {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: managedComments[0].id,
                  body,
                });
              }
            } else {
              await Promise.all(
                managedComments.map((comment) =>
                  github.rest.issues.deleteComment({
                    owner,
                    repo,
                    comment_id: comment.id,
                  }),
                ),
              );
            }
